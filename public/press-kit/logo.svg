<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="E-ARI">
  <!--
    E-ARI brand mark, v2 — the Threshold E.
    A confident geometric "E" formed from three horizontal bars on a deep-
    navy rounded square. The middle bar is shorter than the outer two,
    which reads simultaneously as an E and as an abstract bar-chart of
    ascending readiness. Three values of brand blue (deep → light) carry
    the maturity-progression story without any rainbow ornament.
  -->
  <rect width="48" height="48" rx="11" fill="#0a1024"/>
  <rect x="0.5" y="0.5" width="47" height="47" rx="10.5" stroke="#1e2a45" stroke-opacity="0.8" stroke-width="1" fill="none"/>
  <rect x="12" y="13" width="24" height="4" rx="1.2" fill="#60a5fa"/>
  <rect x="12" y="22" width="14" height="4" rx="1.2" fill="#3b82f6"/>
  <rect x="12" y="31" width="24" height="4" rx="1.2" fill="#1e40af"/>
</svg>
